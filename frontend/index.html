<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Spotify</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <div class="main">

        <h1>Enjoy All Your Songs Here</h1>

        <div class="song-list">

            <div class="song-card" data-song="music/song1.mp3">
                <img src="img/cover1.jpg">
                <h3>Not Dead Yet</h3>
                <p>Bullet for my valentine</p>
            </div>

            <div class="song-card" data-song="music/song2.mp3">
                <img src="img/cover2.png">
                <h3>Waking the Demon</h3>
                <p>Bullet for my valentine</p>
            </div>

            <div class="song-card" data-song="music/song3.mp3">
                <img src="img/cover3.png">
                <h3>Waking the Demon</h3>
                <p>Bullet for my valentine</p>
            </div>

        </div>

    </div>

</div>

<div class="player">

    <div class="song-info">
        <img id="cover" src="img/cover1.jpg">
        <div>
            <h4 id="song-title">Song is playing</h4>
            <p id="artist">Artist</p>
        </div>
    </div>

    <div class="controls">
        <button id="prev">⏮</button>
        <button id="play">▶</button>
        <button id="next">⏭</button>
    </div>

    <div class="progress-area">
        <span id="current-time">0:00</span>
        <input type="range" id="progress" value="0">
        <span id="duration">0:00</span>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
