<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LazyTunes</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <div class="main">

        <h1>Enjoy All Your Songs Here</h1>

        <div class="song-list">

        </div>

    </div>

</div>

<div class="player">

    <div class="song-info">
        <img id="cover" src="./img/default-cover.png">
        <div>
            <h4 id="song-title">Song is playing</h4>
            <p id="artist">Artist</p>
        </div>
    </div>

    <div class="controls">
        <button id="prev">⏮</button>
        <button id="play">▶</button>
        <button id="next">⏭</button>
    </div>

    <div class="progress-area">
        <span id="current-time">0:00</span>
        <input type="range" id="progress" value="0">
        <span id="duration">0:00</span>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
